name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libssl-dev build-essential
    
    - name: Verify OpenSSL
      run: pkg-config --libs openssl
    
    - name: Generate SSL certificates
      run: |
        openssl req -nodes -new -x509 \
          -keyout private.key \
          -out cert.crt \
          -subj "/C=RU/ST=Moscow/L=Moscow/O=Codeby/OU=School/CN=codeby.local"
    
    - name: Build project
      run: make
    
    - name: Test HTTPS server
      run: |
        ./dummy-server.bin &
        sleep 5
        curl -k https://localhost:8443
        kill $!
